name: "Cenário 7 - Massas difernetes e Estrea com perda moderada"

physics:
  gravity: 1.0
  eps: 0.03 # Evita que a forca fique infinita quando os corpos se aproximam muito.
  m1: 1.0
  m2: 0.000003

  initial_position_body_1: [-0.5, 0.0, 0.0]
  initial_position_body_2: [3.0, 0.0, 0.0]
  initial_velocity_body_1: [0.0, 0.0, 0.0]
  initial_velocity_body_2: [0.0, 0.577, 0.0]
  
  center_mass_velocity: [0.0, 0.0, 0.06] # Velocidade do centro de massa do objeto
  massa_variavel: True
  tau1: 60.0 # Tempo característico de perda de massa dos corpos 1 e 2
  tau2: 1000.0 # Tempo característico de perda de massa dos corpos 1 e 2
  t_final: 700.0  # Tempo da simulação em segundos
  n_pontos: 4000
            

chart:
  
  fps: 30
  dpi: 200
  skip: 4
  skip_pillow: 12
  dpi_pillow: 90
  mostrar_grafico: False
  salvar_animacao: True